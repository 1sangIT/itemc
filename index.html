<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ITEM C — 물건을 읽는 매거진</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=Inter:wght@400;500;600;700;900&display=swap');

    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --card2: #1a1a1a;
      --text: #f0f0f0;
      --muted: #888;
      --line: #2a2a2a;
      --accent: #e8ff00;
      --accent2: #ff4d00;
      --r: 4px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--line);
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,10,.92);
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: 3px;
      color: var(--accent);
    }
    .logo span { color: var(--text); }
    .tagline {
      font-size: 11px; color: var(--muted);
      letter-spacing: 1px; text-transform: uppercase;
    }
    nav { display: flex; gap: 28px; }
    nav a {
      font-size: 13px; font-weight: 700; color: var(--muted);
      letter-spacing: 0.5px; text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a:hover, nav a.active { color: var(--text); }

    /* ── HERO ── */
    .hero {
      max-width: 1200px; margin: 0 auto; padding: 60px 24px 40px;
    }
    .hero-label {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 900; letter-spacing: 2px;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 20px;
    }
    .hero-label::before {
      content: '';
      width: 24px; height: 2px; background: var(--accent);
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 2px;
      background: var(--line);
      border: 1px solid var(--line);
    }
    .hero-main {
      grid-column: 1; grid-row: 1 / 3;
      background: var(--card);
      position: relative; overflow: hidden;
      min-height: 520px;
      display: flex; flex-direction: column; justify-content: flex-end;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .hero-main:hover { opacity: .9; }
    .hero-main-img {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    .hero-main-img::after {
      content: '📱';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -70%);
      font-size: 120px; opacity: 0.15;
    }
    .hero-main-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.9) 0%, rgba(0,0,0,.3) 50%, transparent 100%);
    }
    .hero-main-content {
      position: relative; z-index: 1;
      padding: 28px;
    }
    .hero-sub {
      background: var(--card);
      padding: 28px;
      display: flex; flex-direction: column; justify-content: flex-end;
      min-height: 256px; cursor: pointer;
      position: relative; overflow: hidden;
      transition: background 0.2s;
    }
    .hero-sub:hover { background: var(--card2); }
    .hero-sub-img {
      position: absolute; inset: 0; opacity: 0.08;
      font-size: 80px;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-sub-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.9) 0%, rgba(0,0,0,.4) 60%, transparent 100%);
    }
    .hero-sub-content { position: relative; z-index: 1; }

    /* ── BADGES ── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 900; letter-spacing: 1px;
      padding: 3px 8px; border-radius: 2px;
      margin-bottom: 10px;
    }
    .badge-K { background: var(--accent); color: #000; }
    .badge-G { background: #00e5a0; color: #000; }
    .badge-B { background: var(--accent2); color: #fff; }

    .cat-badge {
      display: inline-block;
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      border: 1px solid var(--line); padding: 2px 8px; border-radius: 2px;
      margin-bottom: 8px;
    }

    .card-title-lg {
      font-size: 26px; font-weight: 900; line-height: 1.25;
      margin-bottom: 10px;
    }
    .card-title-md {
      font-size: 18px; font-weight: 900; line-height: 1.3;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 13px; color: var(--muted); line-height: 1.6;
      margin-bottom: 12px;
    }
    .card-meta {
      font-size: 11px; color: #555;
      display: flex; align-items: center; gap: 10px;
    }
    .card-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: #555; }

    /* ── MAIN CONTENT ── */
    .main { max-width: 1200px; margin: 0 auto; padding: 60px 24px; }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }
    .section-title {
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 900; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text);
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::before {
      content: '';
      width: 3px; height: 16px; background: var(--accent);
      border-radius: 2px;
    }
    .see-all {
      font-size: 11px; font-weight: 700; color: var(--muted);
      letter-spacing: 1px; text-transform: uppercase;
      transition: color 0.2s;
    }
    .see-all:hover { color: var(--accent); }

    /* ── ARTICLE GRID ── */
    .article-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: var(--line);
      margin-bottom: 60px;
    }
    .article-card {
      background: var(--card);
      padding: 24px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex; flex-direction: column;
    }
    .article-card:hover { background: var(--card2); }
    .article-thumb {
      width: 100%; aspect-ratio: 16/9;
      border-radius: 2px; margin-bottom: 16px;
      background: #1a1a2e;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; opacity: 0.6;
    }
    .article-card .card-title-sm {
      font-size: 16px; font-weight: 900; line-height: 1.4;
      margin-bottom: 8px; flex: 1;
    }

    /* ── EDITOR PICKS ── */
    .picks-list {
      display: flex; flex-direction: column;
      gap: 2px; background: var(--line);
      margin-bottom: 60px;
    }
    .pick-item {
      background: var(--card);
      padding: 20px 24px;
      display: flex; align-items: center; gap: 20px;
      cursor: pointer; transition: background 0.2s;
    }
    .pick-item:hover { background: var(--card2); }
    .pick-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px; color: var(--line);
      width: 48px; flex-shrink: 0; text-align: center;
      line-height: 1;
    }
    .pick-thumb {
      width: 72px; height: 72px; border-radius: 2px;
      background: #1a1a2e; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .pick-info { flex: 1; }
    .pick-title {
      font-size: 15px; font-weight: 900; line-height: 1.3;
      margin-bottom: 6px;
    }
    .pick-arrow {
      font-size: 18px; color: var(--muted);
      flex-shrink: 0;
    }

    /* ── NEWSLETTER ── */
    .newsletter {
      background: var(--card);
      border: 1px solid var(--line);
      padding: 48px;
      text-align: center;
      margin-bottom: 60px;
    }
    .newsletter-label {
      font-size: 11px; font-weight: 900; letter-spacing: 2px;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 16px;
    }
    .newsletter h2 {
      font-size: 28px; font-weight: 900; margin-bottom: 10px;
    }
    .newsletter p {
      font-size: 14px; color: var(--muted); margin-bottom: 28px;
    }
    .newsletter-form {
      display: flex; gap: 0; max-width: 440px; margin: 0 auto;
    }
    .newsletter-form input {
      flex: 1; padding: 14px 18px;
      background: #0a0a0a; border: 1px solid var(--line);
      border-right: none; border-radius: 2px 0 0 2px;
      color: var(--text); font-family: inherit; font-size: 14px;
      outline: none;
    }
    .newsletter-form input:focus { border-color: var(--accent); }
    .newsletter-form button {
      padding: 14px 24px;
      background: var(--accent); color: #000;
      border: none; font-weight: 900; font-size: 13px;
      letter-spacing: 1px; cursor: pointer;
      border-radius: 0 2px 2px 0; font-family: inherit;
      transition: opacity 0.2s;
    }
    .newsletter-form button:hover { opacity: 0.85; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--line);
      padding: 32px 24px;
    }
    .footer-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 3px;
      color: var(--accent);
    }
    .footer-copy { font-size: 12px; color: #444; }

    /* ── HAMBURGER ── */
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--text); border-radius: 2px;
      transition: all 0.3s;
    }
    .mobile-nav {
      display: none;
      position: fixed; inset: 0; top: 60px;
      background: rgba(10,10,10,.98);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 32px; z-index: 99;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a {
      font-size: 24px; font-weight: 900; color: var(--muted);
      letter-spacing: 2px; text-transform: uppercase;
    }
    .mobile-nav a:hover { color: var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .tagline { display: none; }
      nav { display: none; }
      .hamburger { display: flex; }

      .hero { padding: 32px 16px 24px; }
      .hero-grid { grid-template-columns: 1fr; }
      .hero-main { grid-row: auto; min-height: 280px; }
      .card-title-lg { font-size: 20px; }
      .hero-main-content { padding: 20px; }
      .hero-sub { min-height: 180px; padding: 20px; }
      .card-title-md { font-size: 15px; }

      .main { padding: 40px 16px; }
      .article-grid { grid-template-columns: 1fr; }

      .pick-item { padding: 16px; gap: 12px; }
      .pick-num { font-size: 28px; width: 36px; }
      .pick-thumb { width: 56px; height: 56px; font-size: 22px; }
      .pick-title { font-size: 14px; }

      .newsletter { padding: 32px 16px; }
      .newsletter h2 { font-size: 20px; }
      .newsletter-form { flex-direction: column; }
      .newsletter-form input {
        border-right: 1px solid var(--line);
        border-bottom: none;
        border-radius: 2px 2px 0 0;
      }
      .newsletter-form button { border-radius: 0 0 2px 2px; }

      .footer-inner { flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div>
      <div class="logo">ITEM<span> C</span></div>
    </div>
    <div class="tagline">물건을 읽는 매거진</div>
    <nav>
      <a href="#" class="active">전체</a>
      <a href="#">가젯</a>
      <a href="#">라이프</a>
      <a href="#">리뷰</a>
      <a href="#">뉴스레터</a>
    </nav>
    <button class="hamburger" id="menuBtn" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- MOBILE NAV -->
<nav class="mobile-nav" id="mobileNav">
  <a href="#" onclick="closeMobileNav()">전체</a>
  <a href="#" onclick="closeMobileNav()">가젯</a>
  <a href="#" onclick="closeMobileNav()">라이프</a>
  <a href="#" onclick="closeMobileNav()">리뷰</a>
  <a href="#" onclick="closeMobileNav()">뉴스레터</a>
</nav>
<script>
  const menuBtn = document.getElementById('menuBtn');
  const mobileNav = document.getElementById('mobileNav');
  menuBtn.addEventListener('click', () => mobileNav.classList.toggle('open'));
  function closeMobileNav() { mobileNav.classList.remove('open'); }
</script>

<!-- HERO -->
<section class="hero">
  <div class="hero-label">이번 주 에디터 픽</div>
  <div class="hero-grid" id="heroGrid">
    <div style="grid-column:1/-1; padding:60px; text-align:center; color:#555; font-size:14px;">불러오는 중...</div>
  </div>
</section>

<!-- MAIN -->
<main class="main">

  <!-- 최신 아티클 -->
  <div class="section-header">
    <div class="section-title">최신 아티클</div>
  </div>
  <div class="article-grid" id="articleGrid">
    <div style="grid-column:1/-1; padding:40px; text-align:center; color:#555; font-size:14px;">불러오는 중...</div>
  </div>

  <!-- 에디터 픽 랭킹 -->
  <div class="section-header" id="picksHeader" style="display:none;">
    <div class="section-title">이달의 강력 추천</div>
  </div>
  <div class="picks-list" id="picksList"></div>

  <!-- 뉴스레터 -->
  <div class="newsletter">
    <div class="newsletter-label">Newsletter</div>
    <h2>매주 목요일, 살 거리를 알려드립니다</h2>
    <p>에디터 3인의 직접 구매 후기 + 이번 주 핫딜을 이메일로 받아보세요.</p>
    <div class="newsletter-form">
      <input type="email" id="subEmail" placeholder="이메일 주소를 입력하세요" />
      <button id="subBtn" onclick="subscribe()">구독하기</button>
    </div>
    <div id="subMsg" style="margin-top:12px;font-size:13px;display:none;"></div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://axgiamwbkwjivbmfvvww.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4Z2lhbXdia3dqaXZibWZ2dnd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTAxNjEsImV4cCI6MjA5NjM2NjE2MX0.fz9iaZa9NCzLkszEnvqxBhdaFwj2J0tR6QFZH13Pwwo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const BADGE = {
  K: '<span class="badge badge-K">✍ 편집장 K</span>',
  G: '<span class="badge badge-G">💰 에디터 G</span>',
  B: '<span class="badge badge-B">🔪 에디터 B</span>'
};

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'});
}

function articleUrl(a) {
  return 'article.html?slug=' + encodeURIComponent(a.slug);
}

function coverBg(a) {
  if (a.cover_image_url) return `background:url('${a.cover_image_url}') center/cover`;
  return '';
}

async function loadMain() {
  const { data: articles } = await sb
    .from('articles')
    .select('*')
    .eq('published', true)
    .order('created_at', { ascending: false })
    .limit(12);

  if (!articles || articles.length === 0) {
    document.getElementById('heroGrid').innerHTML =
      '<div style="grid-column:1/-1;padding:60px;text-align:center;color:#555;font-size:14px;">아직 발행된 글이 없습니다.</div>';
    document.getElementById('articleGrid').innerHTML =
      '<div style="grid-column:1/-1;padding:40px;text-align:center;color:#555;font-size:14px;">아직 발행된 글이 없습니다.</div>';
    return;
  }

  // ── HERO ──
  const heroGrid = document.getElementById('heroGrid');
  const main = articles[0];
  const sub1 = articles[1];
  const sub2 = articles[2];

  let heroHtml = `
    <div class="hero-main" onclick="location.href='${articleUrl(main)}'" style="${coverBg(main)}">
      ${!main.cover_image_url ? '<div class="hero-main-img"></div>' : ''}
      <div class="hero-main-overlay"></div>
      <div class="hero-main-content">
        <div class="cat-badge">${main.category}</div>
        ${BADGE[main.author_id] || ''}
        <div class="card-title-lg">${main.title}</div>
        <div class="card-desc">${main.description || ''}</div>
        <div class="card-meta">
          <span>${fmtDate(main.created_at)}</span>
          <span class="card-meta-dot"></span>
          <span>읽는 데 ${main.read_time}분</span>
        </div>
      </div>
    </div>`;

  function subCardHtml(a) {
    const bgStyle = a.cover_image_url ? `style="background:url('${a.cover_image_url}') center/cover"` : '';
    const imgEl = a.cover_image_url
      ? '<div class="hero-sub-overlay"></div>'
      : `<div class="hero-sub-img">${a.cover_emoji || '📦'}</div>`;
    return `
    <div class="hero-sub" onclick="location.href='${articleUrl(a)}'" ${bgStyle}>
      ${imgEl}
      <div class="hero-sub-content">
        <div class="cat-badge">${a.category}</div>
        ${BADGE[a.author_id] || ''}
        <div class="card-title-md">${a.title}</div>
        <div class="card-meta" style="margin-top:8px;">
          <span>${fmtDate(a.created_at)}</span>
          <span class="card-meta-dot"></span>
          <span>${a.read_time}분</span>
        </div>
      </div>
    </div>`;
  }

  if (sub1) heroHtml += subCardHtml(sub1);
  if (sub2) heroHtml += subCardHtml(sub2);

  heroGrid.innerHTML = heroHtml;

  // ── ARTICLE GRID ──
  const gridArticles = articles.slice(3, 9);
  if (gridArticles.length === 0) {
    document.getElementById('articleGrid').innerHTML =
      '<div style="grid-column:1/-1;padding:40px;text-align:center;color:#555;font-size:14px;">더 많은 글이 곧 올라옵니다.</div>';
  } else {
    document.getElementById('articleGrid').innerHTML = gridArticles.map(a => `
      <div class="article-card" onclick="location.href='${articleUrl(a)}'">
        <div class="article-thumb" ${a.cover_image_url ? `style="background:url('${a.cover_image_url}') center/cover;opacity:1;font-size:0;"` : ''}>${a.cover_image_url ? '' : (a.cover_emoji || '📦')}</div>
        <div class="cat-badge">${a.category}</div>
        ${BADGE[a.author_id] || ''}
        <div class="card-title-sm">${a.title}</div>
        <div class="card-desc">${a.description || ''}</div>
        <div class="card-meta" style="margin-top:auto;padding-top:12px;">
          <span>${fmtDate(a.created_at)}</span>
          <span class="card-meta-dot"></span>
          <span>${a.read_time}분</span>
        </div>
      </div>`).join('');
  }

  // ── PICKS ──
  const picks = articles.slice(9, 12);
  if (picks.length > 0) {
    document.getElementById('picksHeader').style.display = '';
    document.getElementById('picksList').innerHTML = picks.map((a, i) => `
      <div class="pick-item" onclick="location.href='${articleUrl(a)}'">
        <div class="pick-num">0${i+1}</div>
        <div class="pick-thumb">${a.cover_emoji || '📦'}</div>
        <div class="pick-info">
          ${BADGE[a.author_id] || ''}
          <div class="pick-title" style="margin-top:6px;">${a.title}</div>
          <div class="card-meta">
            <span>${a.category}</span>
            <span class="card-meta-dot"></span>
            <span>${fmtDate(a.created_at)}</span>
          </div>
        </div>
        <div class="pick-arrow">→</div>
      </div>`).join('');
  }
}

loadMain();

async function subscribe() {
  const email = document.getElementById('subEmail').value.trim();
  const msg = document.getElementById('subMsg');
  const btn = document.getElementById('subBtn');
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    msg.style.display = '';
    msg.style.color = '#ff4d00';
    msg.textContent = '올바른 이메일 주소를 입력해주세요.';
    return;
  }
  btn.disabled = true;
  btn.textContent = '처리 중...';
  const { error } = await sb.from('subscribers').insert({ email });
  msg.style.display = '';
  if (!error) {
    msg.style.color = '#e8ff00';
    msg.textContent = '✓ 구독 완료! 매주 목요일 아침 받아보실 수 있어요.';
    document.getElementById('subEmail').value = '';
  } else if (error.code === '23505') {
    msg.style.color = '#888';
    msg.textContent = '이미 구독 중인 이메일입니다.';
  } else {
    msg.style.color = '#ff4d00';
    msg.textContent = '오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
  }
  btn.disabled = false;
  btn.textContent = '구독하기';
}
</script>
