<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>reMarkable Paper Pro 3개월 실사용 후기 — ITEM C</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@400;700&family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap');

    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --card2: #1a1a1a;
      --text: #f0f0f0;
      --muted: #888;
      --line: #2a2a2a;
      --accent: #e8ff00;
      --accent2: #ff4d00;
      --body-max: 680px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--line);
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,10,.92);
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: 3px;
      color: var(--accent);
    }
    .logo span { color: var(--text); }
    .tagline { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    nav { display: flex; gap: 28px; }
    nav a { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; transition: color 0.2s; }
    nav a:hover { color: var(--text); }

    /* ── HERO ── */
    .article-hero {
      position: relative;
      height: 70vh; min-height: 480px;
      overflow: hidden;
      display: flex; align-items: flex-end;
    }
    .article-hero-bg {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 200px; opacity: 0.12;
      background-size: cover;
      background-position: center;
    }
    .article-hero-bg.has-image {
      opacity: 1;
      font-size: 0;
    }
    .article-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.95) 0%, rgba(0,0,0,.4) 60%, rgba(0,0,0,.2) 100%);
    }
    .article-hero-content {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto; width: 100%;
      padding: 0 24px 48px;
    }
    .cat-badge {
      display: inline-block;
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      border: 1px solid #444; padding: 3px 10px; border-radius: 2px;
      margin-bottom: 16px;
    }
    .article-title {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900; line-height: 1.2;
      margin-bottom: 16px;
      max-width: 800px;
    }
    .article-desc {
      font-size: 16px; color: #aaa; line-height: 1.6;
      max-width: 600px; margin-bottom: 24px;
    }
    .article-byline {
      display: flex; align-items: center; gap: 12px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 900; letter-spacing: 1px;
      padding: 4px 10px; border-radius: 2px;
    }
    .badge-K { background: var(--accent); color: #000; }
    .badge-G { background: #00e5a0; color: #000; }
    .badge-B { background: var(--accent2); color: #fff; }
    .byline-info { font-size: 13px; color: var(--muted); }
    .byline-sep { color: #444; }

    /* ── ARTICLE BODY ── */
    .article-wrap {
      max-width: 1200px; margin: 0 auto;
      padding: 64px 24px;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 64px;
      align-items: start;
    }
    .article-body {
      font-family: 'Noto Serif KR', serif;
      font-size: 17px; line-height: 1.9;
      color: #ddd;
    }
    .article-body p { margin-bottom: 28px; }
    .article-body h2 {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 22px; font-weight: 900;
      color: var(--text); margin: 48px 0 16px;
      padding-top: 48px;
      border-top: 1px solid var(--line);
    }
    .article-body h3 {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 17px; font-weight: 900;
      color: var(--text); margin: 32px 0 12px;
    }
    .article-body img {
      width: 100%; border-radius: 4px;
      margin: 32px 0; display: block;
    }
    .article-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 16px 24px; margin: 32px 0;
      background: var(--card);
      font-style: italic; color: #bbb;
      border-radius: 0 4px 4px 0;
    }
    .article-body .verdict {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 24px 28px;
      margin: 40px 0;
    }
    .verdict-title {
      font-family: 'Inter', sans-serif;
      font-size: 11px; font-weight: 900;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--accent); margin-bottom: 16px;
    }
    .verdict-row {
      display: flex; justify-content: space-between;
      align-items: center; padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }
    .verdict-row:last-child { border-bottom: none; }
    .verdict-label { color: var(--muted); }
    .verdict-value { font-weight: 700; }
    .verdict-good { color: #00e5a0; }
    .verdict-bad { color: var(--accent2); }

    /* ── SIDEBAR ── */
    .article-sidebar { position: sticky; top: 80px; }
    .sidebar-box {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .sidebar-title {
      font-size: 10px; font-weight: 900;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
    }
    .sidebar-spec-row {
      display: flex; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .sidebar-spec-row:last-child { border-bottom: none; }
    .sidebar-spec-label { color: var(--muted); }
    .sidebar-spec-value { font-weight: 700; text-align: right; }
    .buy-btn {
      display: block; width: 100%;
      background: var(--accent); color: #000;
      border: none; padding: 14px;
      font-weight: 900; font-size: 14px;
      letter-spacing: 0.5px; cursor: pointer;
      border-radius: 2px; font-family: inherit;
      text-align: center; transition: opacity 0.2s;
      margin-top: 12px;
    }
    .buy-btn:hover { opacity: 0.85; }
    .buy-btn-sub {
      font-size: 11px; color: var(--muted);
      text-align: center; margin-top: 8px;
    }

    /* ── YOUTUBE ── */
    .youtube-wrap {
      max-width: 1200px; margin: 0 auto;
      padding: 0 24px 48px;
    }
    .youtube-embed {
      position: relative; padding-bottom: 56.25%;
      height: 0; overflow: hidden; border-radius: 4px;
      background: #000;
    }
    .youtube-embed iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; border: none;
    }

    /* ── REVIEW LINKS ── */
    .review-links {
      max-width: 1200px; margin: 0 auto;
      padding: 0 24px 48px;
    }
    .review-links-title {
      font-size: 12px; font-weight: 900;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .review-links-title::before { content: ''; width: 3px; height: 14px; background: var(--accent2); border-radius: 2px; }
    .review-links-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 2px; background: var(--line);
    }
    .review-link-card {
      background: var(--card); padding: 20px 24px;
      display: flex; flex-direction: column; gap: 8px;
      transition: background 0.2s; cursor: pointer;
    }
    .review-link-card:hover { background: var(--card2); }
    .review-link-source {
      font-size: 10px; font-weight: 900; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--accent2);
    }
    .review-link-title { font-size: 14px; font-weight: 700; line-height: 1.4; }
    .review-link-arrow { font-size: 18px; color: var(--muted); margin-top: auto; }

    @media (max-width: 768px) {
      .review-links-grid { grid-template-columns: 1fr; }
      .youtube-wrap { padding: 0 16px 32px; }
      .review-links { padding: 0 16px 32px; }
    }

    /* ── RELATED ── */
    .related {
      max-width: 1200px; margin: 0 auto;
      padding: 0 24px 64px;
      border-top: 1px solid var(--line);
      padding-top: 48px;
    }
    .related-title {
      font-size: 12px; font-weight: 900;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 24px;
      display: flex; align-items: center; gap: 10px;
    }
    .related-title::before { content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }
    .related-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
      background: var(--line);
    }
    .related-card {
      background: var(--card); padding: 20px;
      cursor: pointer; transition: background 0.2s;
    }
    .related-card:hover { background: var(--card2); }
    .related-thumb {
      width: 100%; aspect-ratio: 16/9;
      background: #1a1a2e; border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin-bottom: 14px; opacity: 0.7;
    }
    .related-card-title { font-size: 14px; font-weight: 900; line-height: 1.4; margin-bottom: 8px; }
    .related-meta { font-size: 11px; color: var(--muted); }

    /* ── COMMENTS ── */
    .comments {
      max-width: 1200px; margin: 0 auto;
      padding: 0 24px 80px;
    }
    .comments-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
      padding-bottom: 16px; border-bottom: 1px solid var(--line);
    }
    .comments-title {
      font-size: 13px; font-weight: 900;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .comments-count {
      font-size: 12px; color: var(--muted);
      background: var(--card); border: 1px solid var(--line);
      padding: 2px 8px; border-radius: 20px;
    }
    .comment-form {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 4px; padding: 20px; margin-bottom: 28px;
    }
    .comment-form-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .comment-input {
      background: var(--bg); border: 1px solid var(--line);
      border-radius: 2px; padding: 10px 14px;
      color: var(--text); font-family: inherit; font-size: 14px;
      outline: none; transition: border-color 0.2s; width: 100%;
    }
    .comment-input:focus { border-color: var(--accent); }
    .comment-input.name { width: 160px; flex-shrink: 0; }
    textarea.comment-input { resize: none; min-height: 80px; }
    .comment-submit {
      background: var(--accent); color: #000;
      border: none; padding: 10px 20px;
      font-weight: 900; font-size: 13px; cursor: pointer;
      border-radius: 2px; font-family: inherit;
      float: right; margin-top: 8px;
      transition: opacity 0.2s;
    }
    .comment-submit:hover { opacity: 0.85; }
    .comment-list { display: flex; flex-direction: column; gap: 2px; background: var(--line); }
    .comment-item {
      background: var(--card); padding: 20px 24px;
    }
    .comment-meta {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; font-size: 12px;
    }
    .comment-author { font-weight: 900; }
    .comment-date { color: var(--muted); }
    .comment-text { font-size: 14px; line-height: 1.7; color: #ccc; }

    /* ── FOOTER ── */
    footer { border-top: 1px solid var(--line); padding: 32px 24px; }
    .footer-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: var(--accent); }
    .footer-copy { font-size: 12px; color: #444; }

    /* ── HAMBURGER ── */
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--text); border-radius: 2px;
    }
    .mobile-nav {
      display: none;
      position: fixed; inset: 0; top: 60px;
      background: rgba(10,10,10,.98);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 32px; z-index: 99;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a {
      font-size: 24px; font-weight: 900; color: var(--muted);
      letter-spacing: 2px; text-transform: uppercase;
    }
    .mobile-nav a:hover { color: var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .tagline { display: none; }
      nav { display: none; }
      .hamburger { display: flex; }

      .article-hero { height: 50vh; min-height: 320px; }
      .article-hero-bg { font-size: 100px; }
      .article-title { font-size: clamp(22px, 6vw, 36px); }
      .article-desc { font-size: 14px; }
      .article-hero-content { padding: 0 16px 32px; }

      .article-wrap {
        grid-template-columns: 1fr;
        gap: 40px;
        padding: 40px 16px;
      }
      .article-sidebar { position: static; }
      .article-body { font-size: 16px; }

      .related { padding: 0 16px 48px; }
      .related-grid { grid-template-columns: 1fr 1fr; }

      .comments { padding: 0 16px 60px; }
      .comment-form-row { flex-direction: column; }
      .comment-input.name { width: 100%; }

      .footer-inner { flex-direction: column; gap: 8px; text-align: center; }
    }

    @media (max-width: 480px) {
      .related-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<header>
  <div class="header-inner">
    <div>
      <a href="index.html"><div class="logo">ITEM<span> C</span></div></a>

<!-- 유튜브 -->
<div class="youtube-wrap" id="youtubeWrap" style="display:none;">
  <div class="youtube-embed"><iframe id="youtubeFrame" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe></div>

</section>

<footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://axgiamwbkwjivbmfvvww.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4Z2lhbXdia3dqaXZibWZ2dnd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTAxNjEsImV4cCI6MjA5NjM2NjE2MX0.fz9iaZa9NCzLkszEnvqxBhdaFwj2J0tR6QFZH13Pwwo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const BADGE = {
  K: '<span class="badge badge-K">✍ 편집장 K</span>',
  G: '<span class="badge badge-G">💰 에디터 G</span>',
  B: '<span class="badge badge-B">🔪 에디터 B</span>'
};

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'});
}

let currentArticleId = null;

async function loadArticle() {
  const params = new URLSearchParams(location.search);
  const slug = params.get('slug');
  if (!slug) {
    document.getElementById('heroTitle').textContent = '글을 찾을 수 없습니다.';
    return;
  }

  const { data: a } = await sb.from('articles').select('*').eq('slug', slug).eq('published', true).single();
  if (!a) {
    document.getElementById('heroTitle').textContent = '글을 찾을 수 없습니다.';
    return;
  }

  currentArticleId = a.id;
  document.title = a.title + ' — ITEM C';

  // Hero
  const heroBg = document.getElementById('heroBg');
  if (a.cover_image_url) {
    heroBg.style.backgroundImage = `url('${a.cover_image_url}')`;
    heroBg.classList.add('has-image');
  } else {
    heroBg.textContent = a.cover_emoji || '📦';
  }
  document.getElementById('heroCat').textContent = a.category;
  document.getElementById('heroTitle').textContent = a.title;
  document.getElementById('heroDesc').textContent = a.description || '';
  document.getElementById('heroByline').innerHTML = `
    ${BADGE[a.author_id] || ''}
    <span class="byline-info">${fmtDate(a.created_at)}</span>
    <span class="byline-sep">·</span>
    <span class="byline-info">읽는 데 ${a.read_time}분</span>`;

  // Body + Verdict
  let bodyHtml = a.body || '<p style="color:#555;">본문이 없습니다.</p>';

  if (a.verdict && a.verdict.length) {
    const typeClass = { good: 'verdict-good', bad: 'verdict-bad', neutral: '' };
    const typeSuffix = { good: ' ✓', bad: ' ✗', neutral: '' };
    const rows = a.verdict.map(r => `
      <div class="verdict-row">
        <span class="verdict-label">${esc(r.label)}</span>
        <span class="verdict-value ${typeClass[r.type] || ''}">${esc(r.value)}${typeSuffix[r.type] || ''}</span>
      </div>`).join('');
    bodyHtml += `<div class="verdict"><div class="verdict-title">ITEM C 총평</div>${rows}</div>`;
  }

  document.getElementById('articleBody').innerHTML = bodyHtml;

  // Sidebar
  let sidebarHtml = '';

  if (a.specs) {
    const rows = a.specs.split('\n').filter(l => l.includes(':')).map(l => {
      const idx = l.indexOf(':');
      const label = l.slice(0, idx).trim();
      const value = l.slice(idx + 1).trim();
      return `<div class="sidebar-spec-row">
        <span class="sidebar-spec-label">${esc(label)}</span>
        <span class="sidebar-spec-value">${esc(value)}</span>
      </div>`;
    }).join('');
    sidebarHtml += `<div class="sidebar-box"><div class="sidebar-title">제품 스펙</div>${rows}</div>`;
  }

  if (a.buy_url) {
    const label = a.buy_label || '가격 확인 →';
    sidebarHtml += `
      <a href="${esc(a.buy_url)}" target="_blank" rel="noopener" class="buy-btn">${esc(label)}</a>
      <div class="buy-btn-sub">파트너스 활동으로 수수료를 받을 수 있습니다</div>`;
  }

  if (!sidebarHtml) {
    sidebarHtml = `<div class="sidebar-box">
      <div class="sidebar-title">${esc(a.category)}</div>
      <div class="sidebar-spec-row">
        <span class="sidebar-spec-label">에디터</span>
        <span class="sidebar-spec-value">${BADGE[a.author_id] || a.author_id}</span>
      </div>
      <div class="sidebar-spec-row">
        <span class="sidebar-spec-label">읽는 시간</span>
        <span class="sidebar-spec-value">${a.read_time}분</span>
      </div>
    </div>`;
  }

  document.getElementById('articleSidebar').innerHTML = sidebarHtml;

  // YouTube embed
  if (a.youtube_url) {
    const videoId = extractYoutubeId(a.youtube_url);
    if (videoId) {
      document.getElementById('youtubeFrame').src = `https://www.youtube.com/embed/${videoId}`;
      document.getElementById('youtubeWrap').style.display = '';
    }
  }

  // Review links
  if (a.review_links && a.review_links.length) {
    const sourceIcon = s => {
      if (/youtube|youtu\.be/i.test(s)) return '📺';
      if (/verge|wired|engadget|techcrunch|cnet/i.test(s)) return '🌐';
      return '📝';
    };
    document.getElementById('reviewLinksGrid').innerHTML = a.review_links.map(r => `
      <a class="review-link-card" href="${esc(r.url)}" target="_blank" rel="noopener">
        <div class="review-link-source">${sourceIcon(r.source + r.url)} ${esc(r.source)}</div>
        <div class="review-link-title">${esc(r.title)}</div>
        <div class="review-link-arrow">↗</div>
      </a>`).join('');
    document.getElementById('reviewLinksSection').style.display = '';
  }

  // Related
  const { data: related } = await sb.from('articles')
    .select('*').eq('published', true)
    .neq('id', a.id).limit(3);
  if (related?.length) {
    document.getElementById('relatedSection').style.display = '';
    document.getElementById('relatedGrid').innerHTML = related.map(r => `
      <div class="related-card" onclick="location.href='article.html?slug=${encodeURIComponent(r.slug)}'">
        <div class="related-thumb">${r.cover_emoji || '📦'}</div>
        ${BADGE[r.author_id] || ''}
        <div class="related-card-title" style="margin-top:8px;">${r.title}</div>
        <div class="related-meta">${fmtDate(r.created_at)} · ${r.read_time}분</div>
      </div>`).join('');
  }

  loadComments();
}

async function loadComments() {
  if (!currentArticleId) return;
  const { data } = await sb.from('comments')
    .select('*').eq('article_id', currentArticleId)
    .order('created_at', { ascending: false });

  const list = document.getElementById('commentList');
  const count = data?.length || 0;
  document.getElementById('commentCount').textContent = count;

  if (!count) {
    list.innerHTML = '<div style="padding:24px;text-align:center;color:#555;font-size:14px;">첫 댓글을 남겨보세요.</div>';
    return;
  }
  list.innerHTML = data.map(c => `
    <div class="comment-item">
      <div class="comment-meta">
        <span class="comment-author">${esc(c.author_name)}</span>
        <span class="comment-date">${fmtDate(c.created_at)}</span>
      </div>
      <div class="comment-text">${esc(c.body)}</div>
    </div>`).join('');
}

async function submitComment() {
  const name = document.getElementById('commentName').value.trim() || '익명';
  const body = document.getElementById('commentBody').value.trim();
  if (!body) return;
  if (!currentArticleId) return;

  const btn = document.getElementById('commentSubmit');
  btn.disabled = true; btn.textContent = '등록 중...';

  const { error } = await sb.from('comments').insert({
    article_id: currentArticleId,
    author_name: name,
    body
  });

  btn.disabled = false; btn.textContent = '등록';
  if (error) { alert('댓글 등록 실패: ' + error.message); return; }

  document.getElementById('commentName').value = '';
  document.getElementById('commentBody').value = '';
  loadComments();
}

function extractYoutubeId(url) {
  const patterns = [
    /youtu\.be\/([^?&]+)/,
    /youtube\.com\/watch\?v=([^&]+)/,
    /youtube\.com\/embed\/([^?&]+)/,
    /youtube\.com\/shorts\/([^?&]+)/
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadArticle();
</script>
</body>
</html>
